<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 8" shape-rendering="crispEdges">
  <!-- 6x6 pixel circle on 8x8 grid — goblin green, no anti-aliasing -->
  <rect x="2" y="0" width="4" height="1" fill="#7bbf7b"/>
  <rect x="1" y="1" width="6" height="1" fill="#7bbf7b"/>
  <rect x="0" y="2" width="8" height="4" fill="#7bbf7b"/>
  <rect x="1" y="6" width="6" height="1" fill="#7bbf7b"/>
  <rect x="2" y="7" width="4" height="1" fill="#7bbf7b"/>
</svg>
